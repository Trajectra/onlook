name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build (webpack) and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles("**/bun.lock") }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Create .env file
        working-directory: apps/web/client
        run: |
          cat > .env << ENVEOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          CSB_API_KEY=${{ secrets.CSB_API_KEY }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          SKIP_ENV_VALIDATION=1
          ENVEOF

      - name: Build Next.js app (webpack)
        working-directory: apps/web/client
        env:
          STANDALONE_BUILD: "true"
          NODE_OPTIONS: "--max-old-space-size=6144"
          SKIP_ENV_VALIDATION: "1"
        run: npx next build --webpack

      - name: Package build output
        working-directory: apps/web/client
        run: |
          cp -r public .next/standalone/apps/web/client/
          cp -r .next/static .next/standalone/apps/web/client/.next/
          tar -czf /tmp/onlook-build.tar.gz -C .next/standalone .

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            pm2 stop onlook 2>/dev/null || true

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: /tmp/onlook-build.tar.gz
          target: /tmp/
          strip_components: 2

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            rm -rf /root/onlook/apps/web/client/.next/standalone
            mkdir -p /root/onlook/apps/web/client/.next/standalone
            tar -xzf /tmp/onlook-build.tar.gz -C /root/onlook/apps/web/client/.next/standalone
            pm2 delete onlook 2>/dev/null || true
            pm2 start /root/onlook/ecosystem.config.cjs 2>/dev/null || \
              pm2 start /root/onlook/apps/web/client/.next/standalone/apps/web/client/server.js --name onlook
            echo "Deployment complete!"
