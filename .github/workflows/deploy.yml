name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        working-directory: apps/web/client
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER: ${{ secrets.OPENROUTER_API_KEY }}
          CSB: ${{ secrets.CSB_API_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          DB_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$SUPABASE_URL" > .env
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON" >> .env
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE" >> .env
          printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER" >> .env
          printf 'CSB_API_KEY=%s\n' "$CSB" >> .env
          printf 'AUTH_SECRET=%s\n' "$AUTH_SECRET" >> .env
          printf 'NEXT_PUBLIC_APP_URL=%s\n' "$APP_URL" >> .env
          echo "SKIP_ENV_VALIDATION=1" >> .env
          printf 'SUPABASE_DATABASE_URL=%s\n' "$DB_URL" >> .env

      - name: Build Next.js app
        working-directory: apps/web/client
        env:
          STANDALONE_BUILD: "true"
          NODE_OPTIONS: "--max-old-space-size=6144"
          SKIP_ENV_VALIDATION: "1"
        run: npx next build --webpack

      - name: Package standalone build
        working-directory: apps/web/client
        run: |
          cp -r public .next/standalone/apps/web/client/
          cp -r .next/static .next/standalone/apps/web/client/.next/
          tar -czf onlook-build.tar.gz -C .next/standalone .
          ls -lh onlook-build.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload and deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Upload tarball
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            apps/web/client/onlook-build.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/onlook-build.tar.gz"
          
          # Deploy on server
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash << 'REMOTE'
          set -e
          pm2 stop onlook 2>/dev/null || true
          rm -rf /root/onlook/apps/web/client/.next/standalone
          mkdir -p /root/onlook/apps/web/client/.next/standalone
          tar -xzf /tmp/onlook-build.tar.gz -C /root/onlook/apps/web/client/.next/standalone
          rm -f /tmp/onlook-build.tar.gz
          pm2 delete onlook 2>/dev/null || true
          pm2 start /root/onlook/ecosystem.config.cjs 2>/dev/null || \
            pm2 start /root/onlook/apps/web/client/.next/standalone/apps/web/client/server.js \
              --name onlook -- --port 3001
          pm2 save
          echo "Deployment complete!"
          REMOTE
